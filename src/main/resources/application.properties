# Token
discord.token=${TOKEN}
# PaperTrail API URL
api.url=${API_URL}
# Shard Config
min.shard.id=${MIN_SHARD_ID}
max.shard.id=${MAX_SHARD_ID}
total.shards=${TOTAL_SHARDS}
