# General
papertrail.general.app.name=PaperTrail
papertrail.general.app.version=${quarkus.application.version:N/A}
papertrail.general.github.issue.link=https://github.com/eggy03/PaperTrailBot/issues

# Token
papertrail.discord.token=${TOKEN}

# PaperTrail API URL
papertrail.api.url=${API_URL}

# Shard Config
papertrail.discord.shard.min=${MIN_SHARD_ID:0}
papertrail.discord.shard.max=${MAX_SHARD_ID:0}
papertrail.discord.shard.total=${TOTAL_SHARDS:1}

# Twilight HTTP Proxy URL
# default value is a whitespace
papertrail.discord.twilight.http.proxy.url=${TWILIGHT_HTTP_PROXY_URL: }

#Port
quarkus.http.port=${PORT:8080}
quarkus.management.enabled=true
quarkus.management.port=${MANAGEMENT_PORT:9000}

# Logging Level
quarkus.log.level=${GLOBAL_LOG_LEVEL:INFO}
quarkus.log.category."io.github.eggy03.papertrail.bot".level=${APPLICATION_LOG_LEVEL:INFO}

# Analytics
quarkus.analytics.disabled=true

# Banner
quarkus.banner.path=banner.txt

# Native Build Args
quarkus.native.additional-build-args=\
    --trace-object-instantiation=java.security.SecureRandom,\
    --initialize-at-run-time=\
        com.neovisionaries.ws.client.Misc\\,\
        net.dv8tion.jda.internal.audio.CryptoAdapter$AbstractAaedAdapter\\,\
        net.dv8tion.jda.internal.requests.restaction.MessageCreateActionImpl